<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  >

  <title>Phuket Arang Carpool</title>

  <style>
    :root {
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --grey: #f3f4f6;
      --border: #d1d5db;
      --dark: #111827;
      --muted: #6b7280;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    header {
      background: var(--dark);
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 30px;
    }

    header p {
      margin: 8px 0 0;
      opacity: 0.85;
    }

    main {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    .card,
    .driver {
      background: white;
      border-radius: 15px;
      padding: 18px;
      margin-bottom: 18px;
      border: 1px solid var(--border);
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 16px;
    }

    .driver h2 {
      margin: 0;
    }

    .route {
      color: #666;
      margin-top: 5px;
    }

    .seats {
      margin-top: 10px;
      font-weight: bold;
      color: var(--green);
    }

    .seats.full {
      color: var(--red);
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      opacity: 0.9;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    #status {
      display: none;
      margin-bottom: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    #status.info {
      display: block;
      background: #dbeafe;
      color: #1e3a8a;
    }

    #status.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    #status.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #666;
    }
  </style>
</head>

<body>

  <header>
    <h1>🚗 Carpool Chope</h1>
    <p>First Come • First Served</p>
  </header>

  <main>

    <div id="status"></div>

    <div class="card">
      <h2>Your Name</h2>

      <input
        id="name"
        maxlength="50"
        autocomplete="name"
        placeholder="Enter your name"
      >
    </div>

    <div class="driver">
      <h2>🚘 Ping</h2>
      <div class="route">East</div>

      <div class="seats" id="seats-Ping">
        Loading seats...
      </div>

      <button
        id="button-Ping"
        onclick="bookSeat('Ping')"
        disabled
      >
        Book Seat
      </button>
    </div>

    <div class="driver">
      <h2>🚘 Aaron</h2>
      <div class="route">Caldecott</div>

      <div class="seats" id="seats-Aaron">
        Loading seats...
      </div>

      <button
        id="button-Aaron"
        onclick="bookSeat('Aaron')"
        disabled
      >
        Book Seat
      </button>
    </div>

    <div class="driver">
      <h2>🚘 YK</h2>
      <div class="route">Church</div>

      <div class="seats" id="seats-YK">
        Loading seats...
      </div>

      <button
        id="button-YK"
        onclick="bookSeat('YK')"
        disabled
      >
        Book Seat
      </button>
    </div>

    <div class="driver">
      <h2>🚘 Jia Hwan</h2>
      <div class="route">East</div>

      <div class="seats" id="seats-Jiahwan">
        Loading seats...
      </div>

      <button
        id="button-Jiahwan"
        onclick="bookSeat('Jiahwan')"
        disabled
      >
        Book Seat
      </button>
    </div>

  </main>

  <footer>
    Made with ❤️ for church
  </footer>

  <script>
    const SCRIPT_URL =
      "https://script.google.com/macros/s/AKfycbzyZIW_RqD_pHbStbTM6EIpDon5QmV4bn28FV1k7y97GqCw-yJmTD-iYCwYwNvmayXa/exec";

    const DRIVERS = [
      "Ping",
      "Aaron",
      "YK",
      "Jiahwan"
    ];

    let requestNumber = 0;
    let bookingInProgress = false;
    let latestRideData = null;

    function showStatus(message, type) {
      const status = document.getElementById("status");

      status.textContent = message;
      status.className = type;
    }

    function makeRequest(parameters, responseHandler) {
      requestNumber += 1;

      const callbackName =
        "carpoolCallback" + requestNumber;

      parameters.callback = callbackName;
      parameters.cacheBust = Date.now();

      const query =
        new URLSearchParams(parameters);

      const script =
        document.createElement("script");

      window[callbackName] = function(response) {
        try {
          responseHandler(response);
        } finally {
          delete window[callbackName];
          script.remove();
        }
      };

      script.src =
        SCRIPT_URL + "?" + query.toString();

      script.onerror = function() {
        delete window[callbackName];
        script.remove();

        bookingInProgress = false;

        showStatus(
          "Could not connect to the booking system.",
          "error"
        );

        updateRideDisplay(latestRideData);
      };

      document.body.appendChild(script);
    }

    function loadStatus() {
      makeRequest(
        {
          action: "status"
        },
        function(response) {
          if (!response.success) {
            showStatus(
              response.message ||
              "Could not load seat availability.",
              "error"
            );

            return;
          }

          latestRideData = response.rides;
          updateRideDisplay(response.rides);
        }
      );
    }

    function bookSeat(driver) {
      if (bookingInProgress) {
        return;
      }

      const nameInput =
        document.getElementById("name");

      const name =
        nameInput.value.trim();

      if (!name) {
        showStatus(
          "Please enter your name first.",
          "error"
        );

        nameInput.focus();
        return;
      }

      const confirmed = confirm(
        name +
        ", would you like to book one seat with " +
        driver +
        "?"
      );

      if (!confirmed) {
        return;
      }

      bookingInProgress = true;
      updateRideDisplay(latestRideData);

      showStatus(
        "Booking your seat with " +
        driver +
        "...",
        "info"
      );

      makeRequest(
        {
          action: "book",
          name: name,
          driver: driver
        },
        function(response) {
          bookingInProgress = false;

          if (response.rides) {
            latestRideData = response.rides;
            updateRideDisplay(response.rides);
          } else {
            loadStatus();
          }

          if (response.success) {
            showStatus(
              response.message,
              "success"
            );

            nameInput.disabled = true;
          } else {
            showStatus(
              response.message ||
              "Booking failed.",
              "error"
            );
          }
        }
      );
    }

    function updateRideDisplay(rides) {
      if (!rides) {
        return;
      }

      DRIVERS.forEach(function(driver) {
        const ride = rides[driver];

        const seats =
          document.getElementById(
            "seats-" + driver
          );

        const button =
          document.getElementById(
            "button-" + driver
          );

        if (!ride) {
          seats.textContent = "Unavailable";
          seats.className = "seats full";
          button.textContent = "Unavailable";
          button.disabled = true;
          return;
        }

        if (ride.remaining <= 0) {
          seats.textContent = "FULL";
          seats.className = "seats full";
          button.textContent = "Full";
          button.disabled = true;
          return;
        }

        seats.textContent =
          ride.remaining +
          " Seat" +
          (ride.remaining === 1 ? "" : "s") +
          " Remaining";

        seats.className = "seats";
        button.textContent = "Book Seat";
        button.disabled = bookingInProgress;
      });
    }

    loadStatus();

    setInterval(loadStatus, 30000);
  </script>

</body>

</html>
