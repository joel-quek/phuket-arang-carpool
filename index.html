<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Carpool Chope</title>

<style>

:root{
    --blue:#2563eb;
    --green:#16a34a;
    --red:#dc2626;
    --grey:#f3f4f6;
    --border:#d1d5db;
    --dark:#111827;
}

*{
    box-sizing:border-box;
}

body{

    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;

}

header{

    background:var(--dark);
    color:white;
    padding:20px;

    text-align:center;

}

header h1{

    margin:0;
    font-size:30px;

}

header p{

    margin-top:8px;
    opacity:0.85;

}

main{

    max-width:700px;
    margin:auto;

    padding:20px;

}

.card{

    background:white;

    border-radius:15px;

    padding:18px;

    margin-bottom:18px;

    border:1px solid var(--border);

}

input{

    width:100%;
    padding:14px;

    border-radius:10px;
    border:1px solid var(--border);

    font-size:16px;

}

.driver{

    border:1px solid var(--border);

    border-radius:12px;

    padding:16px;

    margin-top:15px;

}

.driver h2{

    margin:0;

}

.route{

    color:#666;
    margin-top:5px;

}

.seats{

    margin-top:10px;

    font-weight:bold;

    color:var(--green);

}

button{

    margin-top:15px;

    width:100%;

    padding:14px;

    border:none;

    border-radius:10px;

    background:var(--blue);

    color:white;

    font-size:16px;

    cursor:pointer;

}

button:hover{

    opacity:0.9;

}

footer{

    text-align:center;

    padding:20px;

    color:#666;

}

</style>

</head>

<body>

<header>

<h1>🚗 Carpool Chope</h1>

<p>
First Come • First Served
</p>

</header>

<main>

<div class="card">

<h2>Your Name</h2>

<input
id="name"
placeholder="Enter your name">

</div>

<div class="driver">

<h2>🚘 Ping</h2>

<div class="route">
East ➜ Church
</div>

<div class="seats">
2 Seats Remaining
</div>

<button>
Book Seat
</button>

</div>

<div class="driver">

<h2>🚘 Aaron</h2>

<div class="route">
Caldecott ➜ Church
</div>

<div class="seats">
2 Seats Remaining
</div>

<button>
Book Seat
</button>

</div>

<div class="driver">

<h2>🚘 YK</h2>

<div class="route">
Church
</div>

<div class="seats">
3 Seats Remaining
</div>

<button>
Book Seat
</button>

</div>

<div class="driver">

<h2>🚘 Jiahwan</h2>

<div class="route">
East ➜ Church
</div>

<div class="seats">
3 Seats Remaining
</div>

<button>
Book Seat
</button>

</div>

</main>

<footer>

Made with ❤️ for church

</footer>

</body>

</html>
